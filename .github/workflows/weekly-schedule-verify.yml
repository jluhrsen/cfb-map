name: Weekly Schedule Verification

on:
  schedule:
    # Run Sundays at 7:30 AM PT / 10:30 AM ET
    - cron: '30 14 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-main-team-schedules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch NCAA data
        env:
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
        run: node scripts/fetch-ncaa-data.js

      - name: Fetch NFL data
        run: node scripts/fetch-nfl-data.js

      - name: Generate data files
        run: node scripts/generate-data-files.js

      - name: Verify main team schedules
        run: npm run verify:schedules
